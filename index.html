        --text: #f2e8dd;
        --muted: #c4b29e;
        --faint: #98826f;
        --line: rgba(161, 120, 92, 0.22);

        --warning: #ffbf66;
        --danger: #ff7886;

      * { box-sizing: border-box; }
      html { background: var(--bg); color: var(--text); scroll-behavior: smooth; }
      body {

        min-height: 100%;
        font-family: var(--body);
        background:

          radial-gradient(circle at 78% 8%, rgba(122, 166, 255, 0.08), transparent 26%),

        color: var(--text);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.024) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.024) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), transparent 85%);
        opacity: 0.35;
      }

      a { color: inherit; text-decoration: none; }
      button, input, textarea, select { font: inherit; }
      button { cursor: pointer; }

      .shell { position: relative; min-height: 100vh; }
      .container { width: min(var(--content), calc(100vw - 32px)); margin-inline: auto; }
      .stack, .timeline, .thread-list, .bubble-stack { display: grid; gap: 16px; }

      .hero-grid, .split-grid { grid-template-columns: 1.25fr 0.95fr; align-items: stretch; }
      .two-up, .field-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .three-up, .stats-grid, .feature-grid, .package-grid, .testimonial-grid, .qa-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .app-grid { grid-template-columns: 280px minmax(0, 1fr); align-items: start; }
      .kpi-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .message-shell { grid-template-columns: 320px minmax(0, 1fr); }

      .topbar {
        position: sticky; top: 0; z-index: 50; backdrop-filter: blur(18px);
        background: linear-gradient(180deg, rgba(11,13,10,0.86), rgba(11,13,10,0.62));
        border-bottom: 1px solid var(--line);
      }
      body[data-theme="light"] .topbar { background: linear-gradient(180deg, rgba(244,247,238,0.92), rgba(244,247,238,0.72)); }
      .topbar-inner {
        display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 14px 0;
      }
      .topbar-actions, .nav-pills, .hero-cta, .form-actions, .tag-row, .subnav {
        display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      }
      .nav-pills { justify-content: center; }

      .brand { display: inline-flex; align-items: center; gap: 14px; min-width: 0; }
      .brand-mark {

        background: linear-gradient(135deg, rgba(42,92,255,0.96), rgba(122,166,255,0.45)), var(--panel);
        display: grid; place-items: center; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), var(--shadow);

      .brand-mark svg { width: 22px; height: 22px; }
      .brand-copy { min-width: 0; }
      .eyebrow, .card-kicker, .kpi-label, th {

      .brand-title, .headline, .section-title, .page-title, .card-title, .metric-value, .kpi-value, .price strong {

      .brand-title { margin: 0; font-size: 18px; line-height: 1; }
      .brand-subtitle { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

        background: var(--panel-soft); box-shadow: var(--shadow);

      .surface::after, .panel::after, .card::after, .auth-card::after, .sidebar::after, .hero-card::after, .hero-panel::after {

      .hero-card {

      .headline { margin: 0; font-size: clamp(36px, 7vw, 70px); line-height: 0.96; max-width: 11ch; }
      .lead { margin: 22px 0 0; max-width: 54ch; font-size: 17px; line-height: 1.72; color: var(--muted); }
      .section-title, .page-title { margin: 0; font-size: clamp(24px, 3vw, 40px); line-height: 1.05; }

      .body-copy, .timeline-copy { margin: 0; color: var(--muted); line-height: 1.7; }

      .pill, .badge, .mini-badge {

      .badge { padding: 8px 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; }
      .btn {

      .btn[disabled] { opacity: 0.52; cursor: not-allowed; transform: none; }

      .input, .select, .textarea {

      .kpi-card { padding: 18px; border-radius: 20px; }

      .package-card { display: grid; gap: 14px; padding: 22px; border-radius: 24px; background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)); }

      .price { display: flex; align-items: baseline; gap: 8px; }

      .hero-strip { display: grid; gap: 12px; grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 22px; }
      .hero-stat { padding: 16px; border-radius: 20px; }

      th, td { padding: 14px 16px; border-bottom: 1px solid var(--line); text-align: start; vertical-align: top; }

        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>

        function readJson(key, fallback) {
          try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : fallback;
          } catch (_) {
            return fallback;
          }
        }

        function readString(key, fallback) {
          try {
            return localStorage.getItem(key) || fallback;
          } catch (_) {
            return fallback;
          }
        }

        function writeJson(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
        function writeString(key, value) { localStorage.setItem(key, value); }
        function removeStorage(key) { localStorage.removeItem(key); }
        function rememberPendingEmail(email) {

        function isArabic() { return state.language === "ar"; }
        function tr(en, ar) { return isArabic() ? ar : en; }
        function escapeHtml(value) {
          return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;");
        }
        function pathToHash(path, query) {
          const normalized = path.startsWith("/") ? path : `/${path}`;
          const qs = query instanceof URLSearchParams ? query.toString() : "";
          return `#${normalized}${qs ? `?${qs}` : ""}`;
        }

        function parseRoute(rawHash = window.location.hash) {
          if (!rawHash || rawHash === "#") return { path: "/home", query: new URLSearchParams() };
          if (rawHash.startsWith("#access_token=") || rawHash.includes("&access_token=")) {
            return { path: "/verify", query: new URLSearchParams(rawHash.slice(1)) };
          }
          const cleaned = rawHash.startsWith("#") ? rawHash.slice(1) : rawHash;
          const nestedHashIndex = cleaned.indexOf("#access_token=");
          if (nestedHashIndex >= 0) {
            const basePath = cleaned.slice(0, nestedHashIndex) || "/verify";
            const tokenQuery = cleaned.slice(nestedHashIndex + 1);
            return {
              path: basePath.startsWith("/") ? basePath : `/${basePath}`,
              query: new URLSearchParams(tokenQuery),
            };
          }
          const [path, qs = ""] = cleaned.split("?");
          return { path: path.startsWith("/") ? path : `/${path}`, query: new URLSearchParams(qs) };
        }

        function currentRole() {
          const hasAdminScope = state.adminScopes.some((row) => row.status === "active");
          const hasTrainerRole = state.memberships.some((row) => row.status === "active" && (row.role === "admin" || row.role === "trainer"));
          if (hasAdminScope || state.profile?.default_role === "admin") return "admin";
          if (hasTrainerRole) return "trainer";
          return state.clientProfile ? "client" : state.profile?.default_role || null;
        }

        function defaultAppRoute() {

        function canAccessRoute(path) {
          const role = currentRole();
          if (!path.startsWith("/app/")) return true;
          if (!state.session) return false;
          if (path.startsWith("/app/admin/")) return role === "admin";
          if (path.startsWith("/app/trainer/")) return role === "trainer";
          if (path.startsWith("/app/client/")) return role === "client" || role === "trainer";
          return false;

        function sessionHeaders() {
          const headers = { apikey: SUPABASE_ANON_KEY };
          if (state.session?.access_token) headers.Authorization = `Bearer ${state.session.access_token}`;
          return headers;
        }

        async function apiFetch(path, options = {}) {
          const { auth = true, method = "GET", body, headers = {}, raw = false } = options;
          const finalHeaders = { ...(auth ? sessionHeaders() : { apikey: SUPABASE_ANON_KEY }), ...headers };
          const requestInit = { method, headers: finalHeaders };
          if (body instanceof FormData) requestInit.body = body;
          else if (body !== undefined) { requestInit.body = JSON.stringify(body); finalHeaders["Content-Type"] = "application/json"; }
          const response = await fetch(`${SUPABASE_URL}${path}`, requestInit);
          if (response.status === 401 && auth && state.session?.refresh_token) {
            const refreshed = await refreshSession();
            if (refreshed) return apiFetch(path, options);
          }
          if (raw) {
            if (!response.ok) throw new Error(await response.text());
            return response;
          }
          const text = await response.text();
          const data = text ? JSON.parse(text) : null;
          if (!response.ok) {
            const message = data?.msg || data?.message || data?.error_description || data?.error || tr("Request failed", "فشل الطلب");
            throw new Error(message);
          }
          return data;
        }

        function appendFilters(params, filters = []) {
          filters.forEach((filter) => {
            if (!filter || filter.value === undefined) return;
            const { column, op = "eq", value } = filter;
            if (value === null) return params.append(column, "is.null");
            if (op === "in") return params.append(column, `in.(${value.join(",")})`);
            params.append(column, `${op}.${value}`);
          });
        }

        async function restSelect(table, options = {}) {
          const params = new URLSearchParams();
          params.set("select", options.select || "*");
          appendFilters(params, options.filters);
          if (options.order) params.set("order", `${options.order.column}.${options.order.ascending === false ? "desc" : "asc"}${options.order.nulls ? `.${options.order.nulls}` : ""}`);
          if (options.limit) params.set("limit", String(options.limit));
          if (options.offset) params.set("offset", String(options.offset));
          const headers = {};
          if (options.single) headers.Accept = "application/vnd.pgrst.object+json";
          if (options.count) headers.Prefer = "count=exact";
          return apiFetch(`/rest/v1/${table}?${params.toString()}`, { headers });
        }

        async function restInsert(table, payload, options = {}) {
          const params = new URLSearchParams();
          if (options.select) params.set("select", options.select);
          if (options.onConflict) params.set("on_conflict", options.onConflict);
          const headers = { Prefer: `${options.upsert ? "resolution=merge-duplicates, " : ""}return=representation` };
          const data = await apiFetch(`/rest/v1/${table}${params.toString() ? `?${params.toString()}` : ""}`, {
            method: "POST",
            headers,
            body: Array.isArray(payload) ? payload : [payload],
          });
          return options.single ? data?.[0] || null : data;
        }

        async function restUpdate(table, patch, options = {}) {
          const params = new URLSearchParams();
          if (options.select) params.set("select", options.select);
          appendFilters(params, options.filters);
          const headers = { Prefer: "return=representation" };
          const data = await apiFetch(`/rest/v1/${table}?${params.toString()}`, { method: "PATCH", headers, body: patch });
          return options.single ? data?.[0] || null : data;
        }

        async function invokeFunction(name, payload, options = {}) {
          return apiFetch(`/functions/v1/${name}`, { method: options.method || "POST", auth: options.auth !== false, body: payload });
        }

        function redirectTarget(hashPath = "/verify") {
          if (window.location.protocol === "file:") return "";
          return `${window.location.origin}${window.location.pathname}#${hashPath.replace(/^#/, "").replace(/^\//, "/")}`;
        }

        async function refreshSession() {
          if (!state.session?.refresh_token) return false;
          try {
            const data = await apiFetch("/auth/v1/token?grant_type=refresh_token", {
              auth: false,
              method: "POST",
              body: { refresh_token: state.session.refresh_token },
            });
            saveSession(data);
            return true;
          } catch (_) {
            clearSession();
            return false;
          }
        }

        function saveSession(data) {
          state.session = {
            access_token: data.access_token,
            refresh_token: data.refresh_token,
            expires_in: data.expires_in,
            expires_at: Date.now() + Number(data.expires_in || 3600) * 1000,
            token_type: data.token_type,
          };
          writeJson(STORAGE_KEYS.session, state.session);
          removeStorage(STORAGE_KEYS.pendingEmail);
        }

        function clearSession() {
          state.session = null;
          state.user = null;
          state.profile = null;
          state.memberships = [];
          state.clientProfile = null;
          state.adminScopes = [];
          state.organization = null;
          state.workspaceAccess = null;
          state.notificationPreferences = null;
          disconnectRealtime();
          removeStorage(STORAGE_KEYS.session);

        async function safeSelect(table, options = {}, fallback = null) {

            if (message.includes("PGRST116") || message.includes("JSON object requested, multiple (or no) rows returned")) return fallback;

        async function maybeRunPendingBootstrap() {
          const pending = readJson(STORAGE_KEYS.bootstrap, null);
          if (!pending || !state.session || !state.user) return;
          const alreadyTrainer = state.memberships.some((row) => row.status === "active" && (row.role === "admin" || row.role === "trainer"));
          const alreadyClient = Boolean(state.clientProfile?.organization_id);
          if ((pending.kind === "trainer" && alreadyTrainer) || (pending.kind === "client" && alreadyClient)) {
            removeStorage(STORAGE_KEYS.bootstrap);
            return;
          }
          if (pending.kind === "trainer") await invokeFunction("bootstrap-workspace", pending.payload);
          if (pending.kind === "client") await invokeFunction("bootstrap-personal-client", pending.payload);
          removeStorage(STORAGE_KEYS.bootstrap);
          state.profile = null;
          state.memberships = [];
          state.clientProfile = null;
        }

        async function loadUserContext(force = false) {
          if (!state.session) return;
          if (state.user && state.profile && !force) return;
          await fetchCurrentUser();
          const [profile, memberships, clientProfile, adminScopes] = await Promise.all([
            safeSelect("user_profiles", { select: "*", filters: [{ column: "user_id", value: state.user.id }], single: true }, null),
            safeSelect("organization_memberships", { select: "*", filters: [{ column: "user_id", value: state.user.id }, { column: "status", value: "active" }], order: { column: "updated_at", ascending: false } }, []),
            safeSelect("client_profiles", { select: "*", filters: [{ column: "user_id", value: state.user.id }], single: true }, null),
            safeSelect("platform_admin_memberships", { select: "*", filters: [{ column: "user_id", value: state.user.id }], order: { column: "updated_at", ascending: false } }, []),
          ]);
          state.profile = profile;
          state.memberships = Array.isArray(memberships) ? memberships : [];
          state.clientProfile = clientProfile;
          state.adminScopes = Array.isArray(adminScopes) ? adminScopes : [];
          await maybeRunPendingBootstrap();
          const orgId = currentOrgId();
          state.organization = orgId ? await safeSelect("organizations", { select: "*", filters: [{ column: "id", value: orgId }], single: true }, null) : null;

        function disconnectRealtime() {
          if (state.realtime.heartbeat) clearInterval(state.realtime.heartbeat);
          if (state.realtime.socket) state.realtime.socket.close();
          state.realtime.socket = null;
          state.realtime.topic = null;
          state.realtime.heartbeat = null;
          state.realtime.ref = 1;
        }

        function pushRealtime(event, topic, payload) {
          if (!state.realtime.socket || state.realtime.socket.readyState !== WebSocket.OPEN) return;
          const ref = String(state.realtime.ref++);
          state.realtime.socket.send(JSON.stringify({ topic, event, payload, ref, join_ref: topic === "phoenix" ? null : ref }));
        }

        function connectRealtime() {
          if (!state.session?.access_token || !state.user?.id) return;
          disconnectRealtime();
          const wsUrl = `${SUPABASE_URL.replace("https://", "wss://").replace("http://", "ws://")}/realtime/v1/websocket?apikey=${encodeURIComponent(SUPABASE_ANON_KEY)}&vsn=1.0.0`;
          const socket = new WebSocket(wsUrl);
          const topic = "realtime:grindctrl-live";
          socket.addEventListener("open", () => {
            pushRealtime("phx_join", topic, {
              config: {
                broadcast: { ack: false, self: false },
                presence: { enabled: false, key: state.user.id },
                postgres_changes: [
                  { event: "*", schema: "public", table: "notifications", filter: `recipient_user_id=eq.${state.user.id}` },
                  { event: "*", schema: "public", table: "messages" },
                ],
                private: true,
              },
              access_token: state.session.access_token,
            });
            state.realtime.heartbeat = setInterval(() => pushRealtime("heartbeat", "phoenix", {}), 24000);
          });
          socket.addEventListener("message", (event) => {
            try {
              const payload = JSON.parse(event.data);
              if (payload.event === "postgres_changes" && state.route.path.startsWith("/app/")) refreshCurrentRoute();
            } catch (_) {}
          });
          socket.addEventListener("close", () => { if (state.session) setTimeout(connectRealtime, 1800); });
          state.realtime.socket = socket;
          state.realtime.topic = topic;
        }

        async function handleAuthCallbackIfNeeded() {
          const route = parseRoute(window.location.hash);
          const params = route.query;
          if (params.get("access_token") && params.get("refresh_token")) {
            saveSession({
              access_token: params.get("access_token"),
              refresh_token: params.get("refresh_token"),
              expires_in: Number(params.get("expires_in") || 3600),
              token_type: params.get("token_type") || "bearer",
            });
            const inviteToken = readString(STORAGE_KEYS.invite, "");
            window.history.replaceState({}, "", `${window.location.pathname}#${inviteToken ? `/invite?token=${encodeURIComponent(inviteToken)}` : "/verify"}`);
          }
        }

        function pageGuard() {
          if (state.route.path.startsWith("/app/") && !state.session) {
            window.location.hash = "#/login";
            return false;

          return true;

        async function syncRoute() {
          state.route = parseRoute(window.location.hash);
          render();
          if (state.route.path === "/signup") {
            const passwordInput = document.querySelector('#signup-form input[name="password"]');
            const passwordField = passwordInput?.closest(".field");
            if (passwordInput) {
              passwordInput.required = false;
              passwordInput.disabled = true;
              passwordInput.value = "";
            }
            if (passwordField) passwordField.style.display = "none";
          }
          if (!pageGuard()) return;
          await loadPublicPackages();
          if (state.session) await loadUserContext();
          await loadRouteData();
          render();
          if (state.route.path === "/signup") {
            const passwordInput = document.querySelector('#signup-form input[name="password"]');
            const passwordField = passwordInput?.closest(".field");
            if (passwordInput) {
              passwordInput.required = false;
              passwordInput.disabled = true;
              passwordInput.value = "";
            }
            if (passwordField) passwordField.style.display = "none";
          }
        }

        function routeIcon(path) {
          if (path.includes("dashboard") || path.includes("home") || path.includes("overview")) return "home";
          if (path.includes("clients") || path.includes("users")) return "users";
          if (path.includes("program")) return "program";
          if (path.includes("checkin")) return "check";
          if (path.includes("message")) return "message";
          if (path.includes("calendar")) return "calendar";
          if (path.includes("analytics") || path.includes("audit")) return "chart";
          if (path.includes("file")) return "file";
          if (path.includes("setting") || path.includes("access") || path.includes("billing") || path.includes("support")) return "settings";
          return "home";
        }

        function encodeStoragePath(path) {
          return String(path || "").split("/").map((part) => encodeURIComponent(part)).join("/");
        }

        function toNumberOrNull(value) {
          if (value === "" || value === null || value === undefined) return null;
          const num = Number(value);
          return Number.isFinite(num) ? num : null;
        }

        function sanitizeFileName(name) {
          return String(name || "file").replace(/[^a-zA-Z0-9._-]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
        }

        async function uploadObject(bucket, path, file) {
          const headers = sessionHeaders();
          headers["x-upsert"] = "true";
          headers["Content-Type"] = file.type || "application/octet-stream";
          const response = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${encodeStoragePath(path)}`, {
            method: "POST",
            headers,
            body: file,
          });
          if (!response.ok) {
            throw new Error(await response.text());
          }
          return path;
        }

        async function ensureThread(clientUserId, trainerUserId) {
          const thread = await restInsert("message_threads", {
            organization_id: currentOrgId(),
            client_user_id: clientUserId,
            trainer_user_id: trainerUserId,
            channel: "in_app",
            topic: currentRole() === "trainer" ? tr("Client conversation", "محادثة عميل") : tr("Coach conversation", "محادثة مع المدرب"),
            is_active: true,
          }, {
            upsert: true,
            onConflict: "organization_id,client_user_id,trainer_user_id,channel",
            select: "*",
            single: true,
          });
          state.ui.selectedThreadId = thread.id;
          return thread;
        }

        async function submitMessage(formData) {
          const body = String(formData.get("body") || "").trim();
          if (!body) throw new Error(tr("Message body is required", "نص الرسالة مطلوب"));
          let threadId = String(formData.get("threadId") || "").trim();
          if (!threadId) {
            if (currentRole() === "trainer") {
              const clientUserId = String(formData.get("clientUserId") || "").trim();
              if (!clientUserId) throw new Error(tr("Choose a client first", "اختر عميلًا أولًا"));
              const thread = await ensureThread(clientUserId, state.user.id);
              threadId = thread.id;
            } else {
              const trainerUserId = state.clientProfile?.primary_trainer_user_id;
              if (!trainerUserId) throw new Error(tr("No trainer is linked to this client yet", "لا يوجد مدرب مرتبط بهذا العميل بعد"));
              const thread = await ensureThread(state.user.id, trainerUserId);
              threadId = thread.id;
            }
          }
          await restInsert("messages", {
            thread_id: threadId,
            organization_id: currentOrgId(),
            sender_user_id: state.user.id,
            sender_role: currentRole(),
            direction: currentRole() === "client" ? "inbound" : "outbound",
            body,
            locale: state.language,
            direction_pref: isArabic() ? "rtl" : "ltr",
          }, { select: "id", single: true });
        }

        async function runQaSuite() {
          const tests = [];

                organizationId: String(formData.get("organizationId") || "").trim(),
                packageCode: String(formData.get("packageCode") || "").trim(),
                status: String(formData.get("status") || "").trim(),
                activationMode: String(formData.get("activationMode") || "manual").trim(),
                graceUntil: String(formData.get("graceUntil") || "").trim() || null,
              });
              await refreshCurrentRoute(true);
              toast(tr("Workspace access updated.", "تم تحديث وصول المساحة."), "success");
              form.reset();
            });
          }
        }

        async function onClick(event) {
          const target = event.target instanceof Element ? event.target : null;
          const button = target ? target.closest("[data-action]") : null;
          if (!button) return;
          const action = button.dataset.action;
          if (action === "toggle-language") {
            state.language = isArabic() ? "en" : "ar";
            writeString(STORAGE_KEYS.language, state.language);
            render();
            return;
          }
          if (action === "cycle-theme") {
            state.theme = state.theme === "night" ? "light" : state.theme === "light" ? "ember" : "night";
            writeString(STORAGE_KEYS.theme, state.theme);
            render();
            return;
          }
          if (action === "logout") {
            await signOutUser();
            return;
          }
          if (action === "refresh-route") {
            await refreshCurrentRoute(true);
            return;
          }
          if (action === "start-google") {
            const inviteToken = state.route.query.get("token") || readString(STORAGE_KEYS.invite, "");
            if (inviteToken) writeString(STORAGE_KEYS.invite, inviteToken);
            startGoogleAuth();
            return;
          }
          if (action === "choose-thread") {
            state.ui.selectedThreadId = button.dataset.threadId || null;
            await loadRouteData();
            render();
            return;
          }
          if (action === "run-qa") {
            await runQaSuite();
          }
        }

        function bindEvents() {
          document.addEventListener("submit", (event) => {
            onSubmit(event).catch((error) => {
              toast(error.message || tr("Unknown error", "خطأ غير معروف"), "error");
            });
          });
          document.addEventListener("click", (event) => {
            onClick(event).catch((error) => {
              toast(error.message || tr("Unknown error", "خطأ غير معروف"), "error");
            });
          });
          window.addEventListener("hashchange", () => {
            syncRoute().catch((error) => toast(error.message || tr("Route failed", "فشل المسار"), "error"));
          });
        }

        function render() {
          applyAppearance();
          appRoot.innerHTML = `
            <div class="shell">
              ${renderHeader()}
              ${renderMainContent()}
              ${renderFooter()}
              ${renderBusyLayer()}
            </div>
          `;
          renderToasts();
        }

        async function boot() {
          bindEvents();
          if (state.session?.expires_at && Date.now() > state.session.expires_at - 60000) {
            await refreshSession();
          }
          await handleAuthCallbackIfNeeded();
          await syncRoute();
          setInterval(() => {
            if (state.session?.expires_at && Date.now() > state.session.expires_at - 60000) {
              refreshSession().catch(() => {});
            }
          }, 45000);
        }

        boot().catch((error) => {
          toast(error.message || tr("Boot failed", "فشل الإقلاع"), "error");
          render();
        });
      })();
    </script>
  </body>
</html>
