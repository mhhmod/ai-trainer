        function sessionHeaders() {
          const headers = { apikey: SUPABASE_ANON_KEY };
          if (state.session?.access_token) headers.Authorization = `Bearer ${state.session.access_token}`;
          return headers;
        }

        async function apiFetch(path, options = {}) {
          const { auth = true, method = "GET", body, headers = {}, raw = false } = options;
          const finalHeaders = { ...(auth ? sessionHeaders() : { apikey: SUPABASE_ANON_KEY }), ...headers };
          const requestInit = { method, headers: finalHeaders };
          if (body instanceof FormData) requestInit.body = body;
          else if (body !== undefined) { requestInit.body = JSON.stringify(body); finalHeaders["Content-Type"] = "application/json"; }
          const response = await fetch(`${SUPABASE_URL}${path}`, requestInit);
          if (response.status === 401 && auth && state.session?.refresh_token) {
            const refreshed = await refreshSession();
            if (refreshed) return apiFetch(path, options);
          }
          if (raw) {
            if (!response.ok) throw new Error(await response.text());
            return response;
          }
          const text = await response.text();
          const data = text ? JSON.parse(text) : null;
          if (!response.ok) {
            const message = data?.msg || data?.message || data?.error_description || data?.error || tr("Request failed", "فشل الطلب");
            throw new Error(message);
          }
          return data;
        }

        function appendFilters(params, filters = []) {
          filters.forEach((filter) => {
            if (!filter || filter.value === undefined) return;
            const { column, op = "eq", value } = filter;
            if (value === null) return params.append(column, "is.null");
            if (op === "in") return params.append(column, `in.(${value.join(",")})`);
            params.append(column, `${op}.${value}`);
          });
        }

        async function restSelect(table, options = {}) {
          const params = new URLSearchParams();
          params.set("select", options.select || "*");
          appendFilters(params, options.filters);
          if (options.order) params.set("order", `${options.order.column}.${options.order.ascending === false ? "desc" : "asc"}${options.order.nulls ? `.${options.order.nulls}` : ""}`);
          if (options.limit) params.set("limit", String(options.limit));
          if (options.offset) params.set("offset", String(options.offset));
          const headers = {};
          if (options.single) headers.Accept = "application/vnd.pgrst.object+json";
          if (options.count) headers.Prefer = "count=exact";
          return apiFetch(`/rest/v1/${table}?${params.toString()}`, { headers });
        }

        async function restInsert(table, payload, options = {}) {
          const params = new URLSearchParams();
          if (options.select) params.set("select", options.select);
          if (options.onConflict) params.set("on_conflict", options.onConflict);
          const headers = { Prefer: `${options.upsert ? "resolution=merge-duplicates, " : ""}return=representation` };
          const data = await apiFetch(`/rest/v1/${table}${params.toString() ? `?${params.toString()}` : ""}`, {
            method: "POST",
            headers,
            body: Array.isArray(payload) ? payload : [payload],
          });
          return options.single ? data?.[0] || null : data;
        }

        async function restUpdate(table, patch, options = {}) {
          const params = new URLSearchParams();
          if (options.select) params.set("select", options.select);
          appendFilters(params, options.filters);
          const headers = { Prefer: "return=representation" };
          const data = await apiFetch(`/rest/v1/${table}?${params.toString()}`, { method: "PATCH", headers, body: patch });
          return options.single ? data?.[0] || null : data;
        }

        async function invokeFunction(name, payload, options = {}) {
          return apiFetch(`/functions/v1/${name}`, { method: options.method || "POST", auth: options.auth !== false, body: payload });
        }

        function redirectTarget(hashPath = "/verify") {
          if (window.location.protocol === "file:") return "";
          return `${window.location.origin}${window.location.pathname}#${hashPath.replace(/^#/, "").replace(/^\//, "/")}`;
        }

        async function refreshSession() {
          if (!state.session?.refresh_token) return false;
          try {
            const data = await apiFetch("/auth/v1/token?grant_type=refresh_token", {
              auth: false,
              method: "POST",
              body: { refresh_token: state.session.refresh_token },
            });
            saveSession(data);
            return true;
          } catch (_) {
            clearSession();
            return false;
          }
        }

        function saveSession(data) {
          state.session = {
            access_token: data.access_token,
            refresh_token: data.refresh_token,
            expires_in: data.expires_in,
            expires_at: Date.now() + Number(data.expires_in || 3600) * 1000,
            token_type: data.token_type,
          };
          writeJson(STORAGE_KEYS.session, state.session);
          removeStorage(STORAGE_KEYS.pendingEmail);
        }

        function clearSession() {
          state.session = null;
          state.user = null;

        function disconnectRealtime() {

        function pushRealtime(event, topic, payload) {
          if (!state.realtime.socket || state.realtime.socket.readyState !== WebSocket.OPEN) return;
          const ref = String(state.realtime.ref++);
          state.realtime.socket.send(JSON.stringify({ topic, event, payload, ref, join_ref: topic === "phoenix" ? null : ref }));
        }

        function connectRealtime() {
          if (!state.session?.access_token || !state.user?.id) return;
          disconnectRealtime();
          const wsUrl = `${SUPABASE_URL.replace("https://", "wss://").replace("http://", "ws://")}/realtime/v1/websocket?apikey=${encodeURIComponent(SUPABASE_ANON_KEY)}&vsn=1.0.0`;
          const socket = new WebSocket(wsUrl);
          const topic = "realtime:grindctrl-live";
          socket.addEventListener("open", () => {
            pushRealtime("phx_join", topic, {
              config: {
                broadcast: { ack: false, self: false },
                presence: { enabled: false, key: state.user.id },
                postgres_changes: [
                  { event: "*", schema: "public", table: "notifications", filter: `recipient_user_id=eq.${state.user.id}` },
                  { event: "*", schema: "public", table: "messages" },
                ],
                private: true,
              },
              access_token: state.session.access_token,
            });
            state.realtime.heartbeat = setInterval(() => pushRealtime("heartbeat", "phoenix", {}), 24000);
          });
          socket.addEventListener("message", (event) => {
            try {
              const payload = JSON.parse(event.data);
              if (payload.event === "postgres_changes" && state.route.path.startsWith("/app/")) refreshCurrentRoute();
            } catch (_) {}
          });
          socket.addEventListener("close", () => { if (state.session) setTimeout(connectRealtime, 1800); });
          state.realtime.socket = socket;
          state.realtime.topic = topic;
        }

        async function handleAuthCallbackIfNeeded() {
          const route = parseRoute(window.location.hash);
          const params = route.query;
          if (params.get("access_token") && params.get("refresh_token")) {
            saveSession({
              access_token: params.get("access_token"),
              refresh_token: params.get("refresh_token"),
              expires_in: Number(params.get("expires_in") || 3600),
              token_type: params.get("token_type") || "bearer",
            });
            const inviteToken = currentInviteToken();
            window.history.replaceState({}, "", `${window.location.pathname}#${inviteToken ? `/invite?token=${encodeURIComponent(inviteToken)}` : "/verify"}`);
          }
        }

        function groupProgramRows(rows) {
          const grouped = [];
          const byWeek = new Map();
          (rows || []).forEach((row) => {
            const week = Number(pick(row, ["week_number"], 0)) || 0;
            if (!byWeek.has(week)) byWeek.set(week, []);
            byWeek.get(week).push(row);
          });
          Array.from(byWeek.keys()).sort((a, b) => a - b).forEach((week) => grouped.push({ week, rows: byWeek.get(week) }));
          return grouped;
        }

        function encodeStoragePath(path) {
          return String(path || "").split("/").map((part) => encodeURIComponent(part)).join("/");
        }

        function toNumberOrNull(value) {
          if (value === "" || value === null || value === undefined) return null;
          const num = Number(value);
          return Number.isFinite(num) ? num : null;
        }

        function sanitizeFileName(name) {
          return String(name || "file").replace(/[^a-zA-Z0-9._-]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
        }

        async function uploadObject(bucket, path, file) {
          const headers = sessionHeaders();
          headers["x-upsert"] = "true";
          headers["Content-Type"] = file.type || "application/octet-stream";
          const response = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${encodeStoragePath(path)}`, {
            method: "POST",
            headers,
            body: file,
          });
          if (!response.ok) {
            throw new Error(await response.text());
          }
          return path;
        }

        async function submitMessage(formData) {
          const body = String(formData.get("body") || "").trim();
          if (!body) throw new Error(tr("Message body is required", "نص الرسالة مطلوب"));
          let threadId = String(formData.get("threadId") || "").trim();
          if (!threadId) {
            if (currentRole() === "trainer") {
              const clientUserId = String(formData.get("clientUserId") || "").trim();
              if (!clientUserId) throw new Error(tr("Choose a client first", "اختر عميلًا أولًا"));
              const thread = await ensureThread(clientUserId, state.user.id);
              threadId = thread.id;
            } else {
              const trainerUserId = state.clientProfile?.primary_trainer_user_id;
              if (!trainerUserId) throw new Error(tr("No trainer is linked to this client yet", "لا يوجد مدرب مرتبط بهذا العميل بعد"));
              const thread = await ensureThread(state.user.id, trainerUserId);
              threadId = thread.id;
            }
          }
          await restInsert("messages", {
            thread_id: threadId,
            organization_id: currentOrgId(),
            sender_user_id: state.user.id,
            sender_role: currentRole(),
            direction: currentRole() === "client" ? "inbound" : "outbound",

            direction_pref: isArabic() ? "rtl" : "ltr",

        async function onSubmit(event) {
          const form = event.target;
          if (!(form instanceof HTMLFormElement)) return;
          event.preventDefault();
          const formData = new FormData(form);

          if (form.id === "lead-form") {
            await runTask(tr("Sending request", "إرسال الطلب"), async () => {
              const email = normalizeEmail(formData.get("email"));
              if (!validateEmail(email)) throw new Error(tr("Enter a valid email", "أدخل بريدًا صحيحًا"));
              await invokeFunction("capture-lead", {
                name: String(formData.get("name") || "").trim(),
                email,
                phone: String(formData.get("phone") || "").trim(),
                packageCode: String(formData.get("packageCode") || "").trim(),
                language: String(formData.get("language") || state.language),
                note: String(formData.get("note") || "").trim(),
              }, { auth: false });
              toast(tr("Request sent. Ops can review it from the activation queue.", "تم إرسال الطلب. يمكن لفريق التشغيل مراجعته من طابور التفعيل."), "success");
              form.reset();
            });
            return;
          }

          if (form.id === "login-password-form") {
            await runTask(tr("Signing in", "تسجيل الدخول"), async () => {
              const email = normalizeEmail(formData.get("email"));
              const password = String(formData.get("password") || "");
              if (!validateEmail(email)) throw new Error(tr("Enter a valid email", "أدخل بريدًا صحيحًا"));
              if (!validatePassword(password)) throw new Error(tr("Password must be at least 8 characters", "يجب أن تكون كلمة المرور 8 أحرف على الأقل"));
              const inviteToken = state.route.query.get("token") || currentInviteToken();
              if (inviteToken) saveInviteToken(inviteToken, email);
              await signInWithPassword(email, password);
              await refreshCurrentRoute(true);
              window.location.hash = inviteToken ? pathToHash(`/invite?token=${encodeURIComponent(inviteToken)}`) : pathToHash(defaultAppRoute());
            });
            return;
          }

          if (form.id === "login-magic-form") {
            await runTask(tr("Sending magic link", "إرسال الرابط"), async () => {
              const email = normalizeEmail(formData.get("email"));
              if (!validateEmail(email)) throw new Error(tr("Enter a valid email", "أدخل بريدًا صحيحًا"));
              rememberPendingEmail(email);
              const inviteToken = state.route.query.get("token") || currentInviteToken();
              if (inviteToken) saveInviteToken(inviteToken, email);
              await signInWithMagicLink(email);
              toast(tr("Magic link sent. Check your inbox.", "تم إرسال الرابط. تحقق من بريدك."), "success");
            });
            return;
          }

          if (form.id === "signup-form" && !form.dataset.otpModeHandled) {
            form.dataset.otpModeHandled = "1";
            try {
              await runTask(tr("Creating account", "إنشاء الحساب"), async () => {
                const email = normalizeEmail(formData.get("email"));
                const accountType = String(formData.get("accountType") || "client");
                const language = String(formData.get("language") || state.language);
                const inviteToken = state.route.query.get("token") || currentInviteToken();
                if (!validateEmail(email)) throw new Error(tr("Enter a valid email", "أدخل بريدًا صحيحًا"));
                rememberPendingEmail(email);
                if (inviteToken) saveInviteToken(inviteToken, email);
                if (accountType === "trainer") {
                  writePendingBootstrap({
                    kind: "trainer",
                    email,
                    payload: {
                      workspaceName: String(formData.get("workspaceName") || "").trim(),
                      brandName: String(formData.get("brandName") || "").trim(),
                      workspaceShape: String(formData.get("workspaceShape") || "trainer"),
                      packageInterest: String(formData.get("packageInterest") || "solo_coach"),
                      coachingType: String(formData.get("coachingType") || "").trim(),
                      audience: String(formData.get("audience") || "").trim(),
                      language,
                      timezone: String(formData.get("timezone") || "UTC").trim(),
                    },
                  });
                } else if (!inviteToken) {
                  writePendingBootstrap({
                    kind: "client",
                    email,
                    payload: {
                      goal: String(formData.get("goal") || "").trim(),
                      constraints: String(formData.get("constraints") || "").trim(),
                      language,
                      timezone: String(formData.get("timezone") || "UTC").trim(),

                start_date: String(formData.get("startDate") || "").trim() || null,

                locale: state.language,
                direction: isArabic() ? "rtl" : "ltr",

                trainer_user_id: state.user.id,
                checkin_date: String(formData.get("checkinDate") || "").trim(),
                status: "draft",
                notes_trainer: String(formData.get("notesTrainer") || "").trim() || null,
              }, { select: "id", single: true });
              await refreshCurrentRoute();
              toast(tr("Check-in created.", "تم إنشاء التقييم."), "success");
              form.reset();
            });
            return;
          }

          if (form.id === "client-checkin-form") {
            await runTask(tr("Submitting check-in", "إرسال التقييم"), async () => {
              await restInsert("checkins", {
                organization_id: currentOrgId(),
                client_user_id: state.user.id,
                trainer_user_id: state.clientProfile?.primary_trainer_user_id || null,
                checkin_date: String(formData.get("checkinDate") || "").trim(),
                status: "submitted",
                weight_kg: toNumberOrNull(formData.get("weightKg")),
                sleep_hours: toNumberOrNull(formData.get("sleepHours")),
                stress_score: toNumberOrNull(formData.get("stressScore")),
                energy_score: toNumberOrNull(formData.get("energyScore")),
                adherence_score: toNumberOrNull(formData.get("adherenceScore")),
                notes_client: String(formData.get("notesClient") || "").trim() || null,
                submitted_at: new Date().toISOString(),
              }, {
                upsert: true,
                onConflict: "client_user_id,checkin_date",
                select: "id",
                single: true,
              });
              await refreshCurrentRoute();
              toast(tr("Check-in submitted.", "تم إرسال التقييم."), "success");
              form.reset();
            });
            return;
          }

          if (form.id === "message-form") {
            await runTask(tr("Sending message", "إرسال الرسالة"), async () => {
              await submitMessage(formData);
              await refreshCurrentRoute();
              toast(tr("Message sent.", "تم إرسال الرسالة."), "success");
              form.reset();
            });
            return;
          }

          if (form.id === "workout-session-form") {
            await runTask(tr("Scheduling session", "جدولة الجلسة"), async () => {
              await restInsert("workout_sessions", {
                organization_id: currentOrgId(),
                client_user_id: String(formData.get("clientUserId") || "").trim(),
                trainer_user_id: state.user.id,
                scheduled_for: new Date(String(formData.get("scheduledFor") || "")).toISOString(),
                status: "scheduled",
                source: "web_app",
                notes: String(formData.get("notes") || "").trim() || null,
              }, { select: "id", single: true });
              await refreshCurrentRoute();
              toast(tr("Session scheduled.", "تمت جدولة الجلسة."), "success");
              form.reset();
            });
            return;
          }

          if (form.id === "file-upload-form") {
              await runTask(tr("Uploading file", "رفع الملف"), async () => {
                const file = formData.get("file");
                if (!(file instanceof File) || !file.name) throw new Error(tr("Choose a file first", "اختر ملفًا أولًا"));
                const bucket = String(formData.get("bucket") || "coach-assets");
                const note = String(formData.get("note") || "").trim();
                const safeName = `${Date.now()}-${sanitizeFileName(file.name)}`;
                let path = "";

                if (bucket === "coach-assets") {
                  path = currentRole() === "trainer" || currentRole() === "admin"
                    ? `organizations/${currentOrgId()}/files/${state.user?.id || "anon"}/${safeName}`
                    : `profiles/${state.user?.id || "anon"}/files/${safeName}`;
                } else if (bucket === "progress-media") {
                  if (currentRole() !== "client" || !currentOrgId()) {
                    throw new Error(tr("Progress media uploads are only available from a client account linked to a workspace.", "رفع وسائط التقدم متاح فقط من حساب عميل مرتبط بمساحة عمل."));
                  }
                  path = `organizations/${currentOrgId()}/clients/${state.user.id}/${safeName}`;
                } else {
                  throw new Error(tr("Use the message composer for private attachments.", "استخدم نافذة المحادثة لرفع المرفقات الخاصة."));
                }

                const storedPath = await uploadObject(bucket, path, file);

                if (bucket === "progress-media") {
                  await restInsert("progress_media", {
                    organization_id: currentOrgId(),
                    client_user_id: state.user.id,
                    media_type: file.type.startsWith("video/") ? "video" : "photo",
                    storage_bucket: bucket,
                    storage_path: storedPath,
                    caption: note || null,
                    uploaded_by_user_id: state.user.id,
                  }, { select: "id", single: true });
                }

                toast(`${tr("Uploaded to", "تم الرفع إلى")} ${bucket}/${storedPath}`, "success");
                form.reset();
              });
              return;
            }

          if (form.id === "access-request-form") {
            await runTask(tr("Sending access request", "إرسال طلب الوصول"), async () => {
              await restInsert("workspace_access_requests", {
                organization_id: currentOrgId(),
                requested_by: state.user.id,
                requested_package_code: String(formData.get("requestedPackageCode") || "").trim(),
                request_note: String(formData.get("requestNote") || "").trim() || null,
              }, { select: "id", single: true });
              await refreshCurrentRoute();
              toast(tr("Access request sent.", "تم إرسال طلب الوصول."), "success");
            });
            return;
          }

          if (form.id === "progress-form") {
            await runTask(tr("Saving progress", "حفظ التقدم"), async () => {
              await restInsert("progress_measurements", {
                organization_id: currentOrgId(),
                client_user_id: state.user.id,
                measured_on: String(formData.get("measuredOn") || "").trim(),
                metric_key: String(formData.get("metricKey") || "").trim(),
                metric_value: Number(formData.get("metricValue")),
                metric_unit: String(formData.get("metricUnit") || "").trim() || null,
                source: "manual",
                notes: String(formData.get("notes") || "").trim() || null,
              }, { select: "id", single: true });
              await refreshCurrentRoute();
              toast(tr("Progress saved.", "تم حفظ التقدم."), "success");
              form.reset();
            });
            return;
          }

          if (form.id === "organization-settings-form" || form.id === "account-settings-form") {
            await runTask(tr("Saving settings", "حفظ الإعدادات"), async () => {
              const preferredLanguage = String(formData.get("preferredLanguage") || state.language);
              const avatarFile = formData.get("avatarFile");
              let avatarPath = state.profile?.avatar_path || null;
              if (avatarFile instanceof File && avatarFile.name) {
                avatarPath = await uploadObject("coach-assets", `profiles/${state.user.id}/avatar-${Date.now()}-${sanitizeFileName(avatarFile.name)}`, avatarFile);
              }
              await restUpdate("user_profiles", {
                display_name: String(formData.get("displayName") || "").trim() || null,
                phone_e164: String(formData.get("phone") || "").trim() || null,
                preferred_language: preferredLanguage,
                preferred_direction: preferredLanguage === "ar" ? "rtl" : "ltr",
                avatar_path: avatarPath,
              }, {
                filters: [{ column: "user_id", value: state.user.id }],
                select: "*",
                single: true,
              });

              if (form.id === "organization-settings-form") {
                const logoFile = formData.get("logoFile");
                let logoPath = state.organization?.logo_path || null;
                if (logoFile instanceof File && logoFile.name) {
                  logoPath = await uploadObject("coach-assets", `organizations/${currentOrgId()}/logo-${Date.now()}-${sanitizeFileName(logoFile.name)}`, logoFile);
                }
                await restUpdate("organizations", {
                  name: String(formData.get("workspaceName") || "").trim(),
                  brand_name: String(formData.get("brandName") || "").trim() || null,
                  timezone: String(formData.get("timezone") || "UTC").trim(),
                  default_language: preferredLanguage,
                  default_direction: preferredLanguage === "ar" ? "rtl" : "ltr",
                  logo_path: logoPath,
                }, {
                  filters: [{ column: "id", value: currentOrgId() }],
                  select: "*",
                  single: true,
                });
              }

              state.language = preferredLanguage;
              writeString(STORAGE_KEYS.language, preferredLanguage);
              await refreshCurrentRoute(true);
              toast(tr("Settings saved.", "تم حفظ الإعدادات."), "success");
            });
            return;
          }

          if (form.id === "notification-preferences-form") {
            await runTask(tr("Saving preferences", "حفظ التفضيلات"), async () => {
              await restInsert("notification_preferences", {
                user_id: state.user.id,
                email_enabled: formData.has("emailEnabled"),
                in_app_enabled: formData.has("inAppEnabled"),
                digest_enabled: formData.has("digestEnabled"),
                reminder_enabled: formData.has("reminderEnabled"),
                marketing_enabled: formData.has("marketingEnabled"),
              }, {
                upsert: true,
                onConflict: "user_id",
                select: "*",
                single: true,
              });
              await refreshCurrentRoute(true);
              toast(tr("Preferences saved.", "تم حفظ التفضيلات."), "success");
            });
            return;
          }

          if (form.id === "admin-access-form") {
            await runTask(tr("Applying access change", "تطبيق تغيير الوصول"), async () => {
              await invokeFunction("set-workspace-access", {
                organizationId: String(formData.get("organizationId") || "").trim(),
                packageCode: String(formData.get("packageCode") || "").trim(),
                status: String(formData.get("status") || "").trim(),
                activationMode: String(formData.get("activationMode") || "manual").trim(),
                graceUntil: String(formData.get("graceUntil") || "").trim() || null,
              });
              await refreshCurrentRoute(true);
              toast(tr("Workspace access updated.", "تم تحديث وصول المساحة."), "success");
              form.reset();
            });
          }
        }

        async function onClick(event) {
          const target = event.target instanceof Element ? event.target : null;
          const button = target ? target.closest("[data-action]") : null;
          if (!button) return;
          const action = button.dataset.action;
          if (action === "toggle-language") {
            state.language = isArabic() ? "en" : "ar";
            writeString(STORAGE_KEYS.language, state.language);
            render();
            return;
          }
          if (action === "cycle-theme") {
            state.theme = state.theme === "night" ? "light" : state.theme === "light" ? "ember" : "night";
            writeString(STORAGE_KEYS.theme, state.theme);
            render();
            return;
          }
          if (action === "logout") {
            await signOutUser();
            return;
          }
          if (action === "refresh-route") {
            await refreshCurrentRoute(true);
            return;
          }
          if (action === "start-google") {
            const inviteToken = state.route.query.get("token") || currentInviteToken();
            if (inviteToken) saveInviteToken(inviteToken);
            startGoogleAuth();
            return;
          }
          if (action === "choose-thread") {
            state.ui.selectedThreadId = button.dataset.threadId || null;
            await loadRouteData();
            render();
            return;
          }
          if (action === "run-qa") {
            await runQaSuite();
          }
        }

        function bindEvents() {
          document.addEventListener("submit", (event) => {
            onSubmit(event).catch((error) => {
              toast(error.message || tr("Unknown error", "خطأ غير معروف"), "error");
            });
          });
          document.addEventListener("click", (event) => {
            onClick(event).catch((error) => {
              toast(error.message || tr("Unknown error", "خطأ غير معروف"), "error");
            });
          });
          window.addEventListener("hashchange", () => {
            syncRoute().catch((error) => toast(error.message || tr("Route failed", "فشل المسار"), "error"));
          });
        }

        function render() {
          applyAppearance();
          appRoot.innerHTML = `
            <div class="shell">
              ${renderHeader()}
              ${renderMainContent()}
              ${renderFooter()}
              ${renderBusyLayer()}
            </div>
          `;
          renderToasts();
        }

        async function boot() {
          bindEvents();
          if (state.session?.expires_at && Date.now() > state.session.expires_at - 60000) {
            await refreshSession();
          }
          await handleAuthCallbackIfNeeded();
          await syncRoute();
          setInterval(() => {
            if (state.session?.expires_at && Date.now() > state.session.expires_at - 60000) {
              refreshSession().catch(() => {});
            }
          }, 45000);
        }

        boot().catch((error) => {
          toast(error.message || tr("Boot failed", "فشل الإقلاع"), "error");
          render();
        });
      })();
    </script>
  </body>
</html>
