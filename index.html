  <style>
    :root {
      --bg: #0b0c08;
      --bg-soft: #10120d;
      --panel: #13150f;
      --panel-glass: rgba(19, 21, 15, 0.9);
      --text: #f1f3ee;
      --text-muted: #a1a79b;
      --text-soft: #7f867a;
      --line: #2a2f26;
      --line-strong: #3a4236;
      --accent: #2b5fff;
      --ok: #2ea56f;
      --warn: #d5a94d;
      --danger: #df5f70;
      --radius-xl: 18px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --shadow: 0 22px 55px rgba(0, 0, 0, 0.38);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --font-main: "JetBrains Mono", "IBM Plex Mono", "SFMono-Regular", "Consolas", ui-monospace, monospace;
      --max-width: 1300px;
      --transition: 160ms ease;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(120% 80% at 5% 2%, rgba(43, 95, 255, 0.15), transparent 60%),
        radial-gradient(140% 90% at 100% 0%, rgba(61, 74, 44, 0.18), transparent 66%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      line-height: 1.4;
    }
    body { padding: 14px 10px max(14px, var(--safe-bottom)); }
    h1, h2, h3, h4, p { margin: 0; }
    button, input, textarea, select { font: inherit; color: inherit; }
    button { cursor: pointer; border: 0; background: none; }
    .sr-only { position: absolute; inline-size: 1px; block-size: 1px; overflow: hidden; clip-path: inset(50%); white-space: nowrap; }
    #app { inline-size: min(var(--max-width), 100%); margin-inline: auto; }

    .shell {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel-glass);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .shell-inner { min-block-size: min(92vh, 980px); }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-block-end: 1px solid var(--line);
      padding: 12px;
      background: linear-gradient(180deg, rgba(33, 37, 29, 0.84), rgba(18, 20, 15, 0.9));
      position: sticky;
      inset-block-start: 0;
      z-index: 8;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-inline-size: 0; }
    .brand-dot { inline-size: 10px; block-size: 10px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 0 4px rgba(43, 95, 255, 0.24); flex: 0 0 auto; }
    .brand-title { font-weight: 700; letter-spacing: 0.02em; font-size: 14px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub { font-size: 11px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    .segmented { display: inline-flex; align-items: center; gap: 4px; border: 1px solid var(--line); padding: 3px; border-radius: 11px; background: var(--bg-soft); }
    .segmented button { border-radius: 8px; padding: 7px 10px; min-inline-size: 48px; font-size: 11px; color: var(--text-muted); transition: background var(--transition), color var(--transition); }
    .segmented button.is-active { background: var(--accent); color: #fff; }

    .btn {
      border-radius: var(--radius-sm);
      border: 1px solid var(--line-strong);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-secondary { background: #1a1d16; color: var(--text); }
    .btn-danger { background: rgba(223, 95, 112, 0.16); border-color: rgba(223, 95, 112, 0.48); color: #ffd8de; }
    .btn[disabled] { opacity: 0.65; cursor: not-allowed; transform: none; }

    .card { border: 1px solid var(--line); background: linear-gradient(180deg, rgba(28, 31, 24, 0.92), rgba(16, 18, 13, 0.92)); border-radius: var(--radius-lg); padding: 12px; }
    .card-grid { display: grid; gap: 10px; }
    .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .metric-card { border: 1px solid var(--line); border-radius: var(--radius-md); background: #11130e; padding: 10px; min-block-size: 95px; display: flex; flex-direction: column; justify-content: space-between; }
    .metric-label { color: var(--text-soft); font-size: 11px; }
    .metric-value { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
    .metric-change { font-size: 11px; color: var(--text-muted); }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .stack { display: flex; flex-direction: column; gap: 6px; }
    .muted { color: var(--text-muted); font-size: 12px; }
    .soft { color: var(--text-soft); font-size: 11px; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #f0f4ea;
      background: #22261e;
    }
    .badge-accent { border-color: rgba(43, 95, 255, 0.8); background: rgba(43, 95, 255, 0.25); color: #dbe4ff; }
    .badge-ok { border-color: rgba(46, 165, 111, 0.65); background: rgba(46, 165, 111, 0.2); color: #d8ffe9; }
    .badge-warn { border-color: rgba(213, 169, 77, 0.65); background: rgba(213, 169, 77, 0.2); color: #ffe8b8; }
    .badge-danger { border-color: rgba(223, 95, 112, 0.68); background: rgba(223, 95, 112, 0.2); color: #ffd8df; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { color: var(--text-muted); font-size: 12px; }
    .input, .textarea {
      inline-size: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: #0f110c;
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .textarea { min-block-size: 110px; resize: vertical; }
    .input:focus-visible, .textarea:focus-visible, .btn:focus-visible, .segmented button:focus-visible, .nav-item:focus-visible, .thread-item:focus-visible, .bottom-nav button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(43, 95, 255, 0.35);
      outline: none;
    }

    .panel-head { margin-block-end: 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .panel-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .state { border: 1px dashed var(--line-strong); border-radius: var(--radius-md); background: rgba(19, 21, 15, 0.52); padding: 14px; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
    .state-title { font-size: 13px; font-weight: 700; }
    .state-copy { font-size: 12px; color: var(--text-muted); }

    .skeleton { position: relative; overflow: hidden; background: #11140f; border: 1px solid #1c2018; border-radius: var(--radius-sm); min-block-size: 18px; }
    .skeleton::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent); animation: shimmer 1.3s infinite; }
    @keyframes shimmer { 100% { transform: translateX(100%); } }

    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: var(--radius-md); background: #10120e; }
    table { inline-size: 100%; border-collapse: collapse; min-inline-size: 640px; }
    th, td { text-align: start; border-block-end: 1px solid #20241c; padding: 9px 10px; font-size: 12px; white-space: nowrap; vertical-align: middle; }
    th { color: var(--text-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; background: #12150f; position: sticky; inset-block-start: 0; }

    .queue-list, .plan-list, .thread-list, .chat-list, .invoice-list { display: grid; gap: 8px; }
    .queue-item, .plan-item, .invoice-item, .thread-item { border: 1px solid var(--line); border-radius: var(--radius-md); background: #10120e; padding: 10px; }
    .thread-item { inline-size: 100%; text-align: start; transition: border-color var(--transition), background var(--transition); }
    .thread-item.is-active { border-color: rgba(43, 95, 255, 0.85); background: rgba(43, 95, 255, 0.16); }

    .chat-wrap { border: 1px solid var(--line); border-radius: var(--radius-md); background: #0f120c; overflow: hidden; display: grid; grid-template-rows: 1fr auto; min-block-size: 320px; }
    .chat-list { padding: 10px; overflow: auto; align-content: start; max-block-size: 360px; }
    .chat-bubble { max-inline-size: min(86%, 520px); border: 1px solid var(--line-strong); border-radius: 12px; background: #171b14; padding: 8px 10px; display: grid; gap: 6px; }
    .chat-bubble.is-me { justify-self: end; border-color: rgba(43, 95, 255, 0.75); background: rgba(43, 95, 255, 0.2); }
    .chat-meta { font-size: 10px; color: var(--text-soft); }
    .chat-actions { display: grid; grid-template-columns: 1fr auto; gap: 8px; border-block-start: 1px solid var(--line); padding: 10px; background: #11140f; }

    .invoice-card { border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 12px; background: linear-gradient(180deg, rgba(23, 26, 19, 0.96), rgba(15, 17, 12, 0.94)); display: grid; gap: 10px; }
    .invoice-lines { border: 1px solid var(--line); border-radius: var(--radius-md); overflow: hidden; }
    .line-row { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 8px; border-block-end: 1px solid #21251d; padding: 8px 10px; font-size: 12px; }
    .line-row:last-child { border-block-end: 0; }
    .auth-wrap { min-block-size: min(92vh, 860px); display: grid; place-items: center; padding: 18px; }
    .auth-card { inline-size: min(470px, 100%); border: 1px solid var(--line); border-radius: var(--radius-xl); background: linear-gradient(180deg, rgba(25, 28, 21, 0.95), rgba(14, 16, 12, 0.95)); padding: 16px; display: grid; gap: 12px; box-shadow: var(--shadow); }
    .auth-grid { display: grid; gap: 10px; }
    .auth-actions { display: grid; gap: 8px; }
    .auth-divider { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; color: var(--text-soft); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    .auth-divider::before, .auth-divider::after { content: ""; block-size: 1px; background: var(--line); }
    .btn-google { inline-size: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; background: #171a14; color: #f3f5ef; border-color: #3b4237; }
    .google-dot { inline-size: 12px; block-size: 12px; border-radius: 999px; background: conic-gradient(#ea4335 0 25%, #fbbc05 25% 50%, #34a853 50% 75%, #4285f4 75% 100%); box-shadow: 0 0 0 1px rgba(0,0,0,.35) inset; }

    .trainer-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); }
    .trainer-side { border-inline-end: 1px solid var(--line); background: linear-gradient(180deg, rgba(18, 21, 16, 0.96), rgba(12, 14, 10, 0.96)); padding: 12px; display: grid; gap: 10px; align-content: start; min-block-size: min(92vh, 980px); }
    .nav-list { display: grid; gap: 6px; }
    .nav-item {
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      padding: 9px 10px;
      text-align: start;
      background: transparent;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .nav-item.is-active { color: #fff; background: rgba(43, 95, 255, 0.18); border-color: rgba(43, 95, 255, 0.65); }
    .trainer-main { min-inline-size: 0; display: grid; grid-template-rows: auto 1fr; }
    .view { padding: 12px; overflow: auto; display: grid; align-content: start; gap: 10px; background: radial-gradient(200px 130px at 95% 0%, rgba(43, 95, 255, 0.15), transparent 70%); }
    .view-header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; }
    .view-title { font-size: 16px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
    .view-copy { color: var(--text-muted); font-size: 12px; max-inline-size: 70ch; }

    .split { display: grid; gap: 10px; grid-template-columns: minmax(0, 1fr); }
    .growth-bars { display: grid; gap: 8px; }
    .bar-row { display: grid; grid-template-columns: 64px 1fr auto; gap: 8px; align-items: center; font-size: 11px; color: var(--text-muted); }
    .bar { block-size: 8px; border-radius: 999px; background: #1b1f17; overflow: hidden; border: 1px solid #2b3127; }
    .bar > span { display: block; block-size: 100%; background: linear-gradient(90deg, #355ef8, #2b5fff); border-radius: 999px; }

    .client-shell { display: grid; grid-template-rows: auto 1fr auto; min-block-size: min(92vh, 980px); background: radial-gradient(300px 180px at 100% 0%, rgba(43, 95, 255, 0.16), transparent 70%); }
    .client-main { padding: 12px; display: grid; gap: 10px; align-content: start; overflow: auto; padding-block-end: calc(74px + var(--safe-bottom)); }
    .bottom-nav { position: sticky; inset-block-end: 0; z-index: 9; border-block-start: 1px solid var(--line); background: rgba(14, 16, 12, 0.98); display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 4px; padding: 7px 6px calc(6px + var(--safe-bottom)); }
    .bottom-nav button { border-radius: 8px; border: 1px solid transparent; padding: 8px 4px; color: var(--text-soft); font-size: 10px; text-align: center; display: grid; gap: 3px; justify-items: center; min-block-size: 52px; transition: background var(--transition), border-color var(--transition), color var(--transition); }
    .bottom-nav button.is-active { color: #fff; border-color: rgba(43, 95, 255, 0.65); background: rgba(43, 95, 255, 0.18); }
    .nav-icon { font-size: 14px; line-height: 1; }

    .toast { position: fixed; inset-inline-end: 14px; inset-block-end: calc(14px + var(--safe-bottom)); z-index: 20; border: 1px solid rgba(43, 95, 255, 0.62); background: rgba(14, 20, 45, 0.95); color: #e7edff; border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4); }

    @media (max-width: 1023px) {
      body { padding-inline: 6px; }
      .trainer-shell { grid-template-columns: 1fr; }
      .trainer-side { border-inline-end: 0; border-block-end: 1px solid var(--line); min-block-size: auto; }
      .nav-list { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .nav-item { justify-content: center; }
      .nav-item span:last-child { display: none; }
      .topbar { padding-inline: 10px; }
    }
    @media (min-width: 820px) {
      .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .split { grid-template-columns: minmax(0, 1fr) minmax(280px, 360px); }
      .client-shell .split { grid-template-columns: minmax(0, 1fr) minmax(240px, 320px); }
    }
    @media (min-width: 1120px) {
      .nav-list { grid-template-columns: 1fr; }
      .nav-item span:last-child { display: inline; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }
  </style>

    function setPendingIntent(intent) {
      localStorage.setItem(authIntentStore, JSON.stringify({ intent: authIntent(intent), ts: Date.now() }));
    }
    function consumePendingIntent() {
      const raw = localStorage.getItem(authIntentStore);
      if (!raw) return null;
      localStorage.removeItem(authIntentStore);
      try {
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.intent || !parsed.ts) return null;
        if ((Date.now() - Number(parsed.ts)) > 86_400_000) return null;
        return authIntent(parsed.intent);
      } catch (_) {
        return authIntent(raw);
      }
    }

    async function initSupabase() {
      if (!window.supabase || !window.supabase.createClient) {
        state.auth.error = "Supabase SDK failed to load.";
        render();
        return;
      }
      state.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      });

      state.supabase.auth.onAuthStateChange(async (_e, session) => {
        state.session = session;
        state.user = session?.user || null;
        state.auth.loading = false;
        state.auth.oauthLoading = false;
        if (session) {
          state.auth.error = "";
          state.auth.notice = "";
          await bootstrapAuthed();
        } else {
          resetAuthed();
          render();
        }
      });

      const { data } = await state.supabase.auth.getSession();
      if (data?.session) {
        state.session = data.session;
        state.user = data.session.user;
        await bootstrapAuthed();
      }
      const hasAuthParams = /(?:^|[?#&])(access_token|refresh_token|code|error|error_description)=/.test(`${window.location.search}${window.location.hash}`);
      if (hasAuthParams) {
        try { window.history.replaceState({}, document.title, authRedirectTo()); } catch (_) {}
      }
      render();
    }

    async function loadUserContext() {
      if (!state.user) return;
      const uid = state.user.id;
      const profileRows = await safeQuery("profile", () => state.supabase.from("user_profiles").select("*").eq("user_id", uid).limit(1), []);
      const memberRows = await safeQuery("memberships", () => state.supabase.from("organization_memberships").select("role,status").eq("user_id", uid).eq("status", "active"), []);
      const profile = profileRows[0] || null;
      state.data.profile = profile;
      const roles = new Set();
      if (profile?.default_role) roles.add(profile.default_role);
      memberRows.forEach((m) => roles.add(m.role));
      const available = [];
      if (roles.has("admin") || roles.has("trainer")) available.push("trainer");
      if (roles.has("client") || available.length === 0) available.push("client");
      state.availableRoles = available;
      if (!state.role || !available.includes(state.role)) {
        const d = profile?.default_role;
        state.role = (d === "trainer" || d === "admin") && available.includes("trainer") ? "trainer" : available[0];
      }
    }

    async function ensurePostAuthSetup() {
      const pending = consumePendingIntent();
      if (!pending || !state.user || !state.supabase) return;
      const uid = state.user.id;
      let shouldBootstrapMembership = false;
      try {
        const { data: profile, error: profileErr } = await state.supabase
          .from("user_profiles")
          .select("user_id,default_role")
          .eq("user_id", uid)
          .maybeSingle();
        if (profileErr && profileErr.code !== "PGRST116") throw profileErr;
        const base = { user_id: uid, preferred_language: state.lang, preferred_direction: state.dir };
        if (!profile?.default_role) {
          base.default_role = pending;
          shouldBootstrapMembership = true;
        }
        const { error: upsertErr } = await state.supabase.from("user_profiles").upsert(base, { onConflict: "user_id" });
        if (upsertErr) throw upsertErr;
      } catch (_) {
        toast(txt("profileSetupWarning"));
        return;
      }
      if (!shouldBootstrapMembership) return;

      try {
        const { data: members, error: membersErr } = await state.supabase
          .from("organization_memberships")
          .select("organization_id,role,status")
          .eq("user_id", uid)
          .eq("status", "active");
        if (membersErr) throw membersErr;
        const hasRole = (members || []).some((m) => m.role === pending || (pending === "trainer" && m.role === "admin"));
        if (!hasRole) {
          const { data: orgs, error: orgErr } = await state.supabase.from("organizations").select("id").order("created_at", { ascending: true }).limit(1);
          if (orgErr) throw orgErr;
          const orgId = orgs?.[0]?.id;
          if (!orgId) throw new Error("No organization");
          const { error: memberUpsertErr } = await state.supabase
            .from("organization_memberships")
            .upsert({ organization_id: orgId, user_id: uid, role: pending, status: "active" }, { onConflict: "organization_id,user_id" });
          if (memberUpsertErr) throw memberUpsertErr;
        }
        toast(txt(pending === "trainer" ? "trainerReady" : "clientReady"));
      } catch (_) {
        toast(txt(pending === "trainer" ? "trainerSetupPending" : "clientSetupPending"));
      }
    }

    function authRedirectTo() {
      return `${window.location.origin}${window.location.pathname}`;
    }
    function parseOAuthErrorFromUrl() {
      const fromSearch = new URLSearchParams(window.location.search);
      const hashRaw = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
      const fromHash = new URLSearchParams(hashRaw);
      const message = fromSearch.get("error_description") || fromHash.get("error_description") || fromSearch.get("error") || fromHash.get("error");
      if (!message) return "";
      try { return decodeURIComponent(String(message).replaceAll("+", " ")); } catch (_) { return String(message); }
    }
    function clearSupabaseAuthCache() {
      const shouldRemove = (k) => {
        if (!k) return false;
        if (k.startsWith("sb-") && k.includes("-auth-token")) return true;
        if (k.includes(SUPABASE_PROJECT_REF) && k.toLowerCase().includes("auth")) return true;
        if (k.toLowerCase().includes("supabase.auth")) return true;
        return false;
      };
      const purgeStore = (store) => {
        if (!store) return;
        const keys = [];
        for (let i = 0; i < store.length; i += 1) {
          const k = store.key(i);
          if (shouldRemove(k)) keys.push(k);
        }
        keys.forEach((k) => store.removeItem(k));
      };
      try { purgeStore(window.localStorage); } catch (_) {}
      try { purgeStore(window.sessionStorage); } catch (_) {}
    }

    async function signIn(email, password) {
      if (state.auth.loading || state.auth.oauthLoading) return;
      if (!state.supabase) { state.auth.error = txt("signinError"); render(); return; }
      if (!email || !password) { state.auth.error = txt("signinMissing"); render(); return; }
      state.auth.loading = true;
      state.auth.error = "";
      state.auth.notice = "";
      render();
      const { error } = await state.supabase.auth.signInWithPassword({ email, password });
      state.auth.loading = false;
      if (error) state.auth.error = error.message || txt("signinError");
      render();
    }
    async function signUp(email, password) {
      if (state.auth.loading || state.auth.oauthLoading) return;
      if (!state.supabase) { state.auth.error = txt("signupError"); render(); return; }
      if (!email || !password) { state.auth.error = txt("signinMissing"); render(); return; }
      state.auth.loading = true;
      state.auth.error = "";
      state.auth.notice = "";
      render();
      const { data, error } = await state.supabase.auth.signUp({
        email,
        password,
        options: {
          data: { signup_intent: state.auth.intent, preferred_language: state.lang, preferred_direction: state.dir }
        }
      });
      state.auth.loading = false;
      if (error) {
        state.auth.error = error.message || txt("signupError");
        render();
        return;
      }
      setPendingIntent(state.auth.intent);
      if (!data?.session) {
        state.auth.mode = "signin";
        state.auth.notice = txt("signupCheckEmail");
        savePrefs();
        render();
      }
    }
    async function signInWithGoogle() {
      if (state.auth.loading || state.auth.oauthLoading) return;
      if (!state.supabase) { state.auth.error = txt("signinError"); render(); return; }
      if (window.location.protocol === "file:") { state.auth.error = txt("signinHostRequired"); render(); return; }
      if (state.auth.mode === "signup") setPendingIntent(state.auth.intent);
      else localStorage.removeItem(authIntentStore);
      state.auth.oauthLoading = true;
      state.auth.error = "";
      state.auth.notice = "";
      render();
      const { data, error } = await state.supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: authRedirectTo(),
          queryParams: { prompt: "select_account" },
          skipBrowserRedirect: true
        }
      });
      if (error) {
        state.auth.oauthLoading = false;
        state.auth.error = error.message || txt("signinError");
        render();
        return;
      }
      const url = data?.url || "";
      if (!url) {
        state.auth.oauthLoading = false;
        state.auth.error = txt("signinError");
        render();
        return;
      }
      if (state.telegram && window.Telegram?.WebApp?.openLink) {
        window.Telegram.WebApp.openLink(url);
        state.auth.oauthLoading = false;
        render();
        return;
      }
      window.location.assign(url);
    }
    async function signOut() {
      let hadError = false;
      try {
        if (state.supabase) {
          const attempts = [{ scope: "global" }, { scope: "local" }, null];
          for (const cfg of attempts) {
            try {
              const res = cfg ? await state.supabase.auth.signOut(cfg) : await state.supabase.auth.signOut();
              if (!res?.error) break;
              hadError = true;
            } catch (_) {
              hadError = true;
            }
          }
        }
      } catch (_) {
        hadError = true;
      }
      clearSupabaseAuthCache();
      state.session = null;
      state.user = null;
      resetAuthed();
      render();
      toast(txt(hadError ? "signoutError" : "signedOut"));
      setTimeout(() => {
        if (!state.session) {
          try { window.location.replace(authRedirectTo()); } catch (_) {}
        }
      }, 80);
    }
    async function saveProfilePrefs() {
      if (!state.user) return;
      const { error } = await state.supabase.from("user_profiles").update({ preferred_language: state.lang, preferred_direction: state.dir }).eq("user_id", state.user.id);
      toast(error ? txt("states.errorTitle") : "Saved");
    }
    async function sendMessage(text) {
      const body = String(text || "").trim();
      if (!body || !state.activeThreadId || state.submitting.message) return;
      const thread = state.data.threads.find((t) => t.id === state.activeThreadId);
      if (!thread) return;
      state.submitting.message = true; render();
      const { error } = await state.supabase.from("messages").insert({
        thread_id: thread.id, organization_id: thread.organization_id, sender_user_id: state.user.id,
        sender_role: isTrainer() ? "trainer" : "client", direction: "outbound", body, locale: state.lang, direction_pref: state.dir
      });
      state.submitting.message = false;
      if (error) toast(txt("states.errorTitle")); else { await loadMessages(thread.id); toast(txt("send")); }
      render();
    }
    async function submitCheckin(formData) {
      if (state.submitting.checkin) return;
      state.submitting.checkin = true; render();
      const payload = {
        weight_kg: readNum(formData.get("weight_kg")),
        waist_cm: readNum(formData.get("waist_cm")),
        sleep_hours: readNum(formData.get("sleep_hours")),
        stress_score: readInt(formData.get("stress_score")),
        energy_score: readInt(formData.get("energy_score")),
        adherence_score: readInt(formData.get("adherence_score")),
        mood_score: readInt(formData.get("mood_score")),
        notes_client: String(formData.get("notes_client") || "").trim()
      };
      const { error } = await state.supabase.rpc("rpc_submit_checkin", { p_checkin_date: new Date().toISOString().slice(0, 10), p_payload: payload });
      state.submitting.checkin = false;
      if (error) toast(txt("states.errorTitle")); else { toast("Check-in submitted"); await loadClient(); }
      render();
    }

    function bindEvents() {
      document.addEventListener("click", (event) => {
        const el = event.target.closest("[data-action]");
        if (!el) return;
        const a = el.dataset.action;
        if (a === "sign-in-google") { signInWithGoogle(); return; }
        if (a === "set-auth-intent") { state.auth.intent = authIntent(el.dataset.intent); state.auth.error = ""; state.auth.notice = ""; savePrefs(); render(); return; }
        if (a === "set-auth-mode") {
          state.auth.mode = authMode(el.dataset.mode);
          state.auth.error = "";
          state.auth.notice = "";
          if (state.auth.mode === "signin") localStorage.removeItem(authIntentStore);
          savePrefs();
          render();
          return;
        }
        if (a === "set-lang") { state.lang = el.dataset.lang === "ar" ? "ar" : "en"; state.dir = state.lang === "ar" ? "rtl" : "ltr"; render(); return; }
        if (a === "set-dir") { state.dir = el.dataset.dir === "rtl" ? "rtl" : "ltr"; render(); return; }
        if (a === "switch-role") { if (state.availableRoles.includes(el.dataset.role)) { state.role = el.dataset.role; loadData(); render(); } return; }
        if (a === "set-tab") { state.tabs[el.dataset.scope] = el.dataset.tab; savePrefs(); render(); return; }
        if (a === "open-thread") { state.activeThreadId = el.dataset.thread || null; if (state.activeThreadId) loadMessages(state.activeThreadId).then(render); render(); return; }
        if (a === "retry-load") { loadData(); return; }
        if (a === "sign-out") { event.preventDefault(); signOut(); return; }
        if (a === "save-pref") { saveProfilePrefs(); return; }
      });

      document.addEventListener("submit", async (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) return;
        if (form.id === "auth-form") {
          event.preventDefault();
          const fd = new FormData(form);
          const email = String(fd.get("email") || "").trim();
          const password = String(fd.get("password") || "");
          if (state.auth.mode === "signup") await signUp(email, password);
          else await signIn(email, password);
          return;
        }
        if (form.id === "message-form") {
          event.preventDefault();
          const input = form.querySelector("#message-input");
          const text = input ? input.value : "";
          await sendMessage(text);
          if (input) input.value = "";
          return;
        }
        if (form.id === "client-checkin-form") {
          event.preventDefault();
          await submitCheckin(new FormData(form));
        }
      });
    }

    async function init() {
      loadPrefs();
      applyLangDir();
      window.__atlasSignOut = () => { signOut(); };
      const oauthError = parseOAuthErrorFromUrl();
      if (oauthError) state.auth.error = oauthError;
      if (window.Telegram && window.Telegram.WebApp) {
        state.telegram = true;
        try { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); } catch (_) {}
      }
      bindEvents();
      render();
      await initSupabase();
    }
    init();
  </script>
</body>
</html>
